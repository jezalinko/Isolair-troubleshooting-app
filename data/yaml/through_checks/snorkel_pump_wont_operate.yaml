version: 2
id: snorkel_pump_wont_operate
title: "Snorkel Pump Won’t Operate"
entry: q_pressure_in_range

policy:
  supported_aircraft: ["214"]
  deprecated_components: ["slave relay"]
  field_procedure:
    cyclic_controller: "Replace full Cyclic Controller in-field; switch repair workshop only"

nodes:

  # ---------------- 1.1 QUICK CHECK ----------------
  q_pressure_in_range:
    type: question
    title: "1.1 Quick Check — Hydraulic Pressure"
    field_prompt: "Is hydraulic pressure in the normal green band (850–1150 psi)?"
    workshop_prompt: "Is hydraulic pressure within normal operating range (850–1150 psi)?"
    show_in_field: true
    visual_refs:
      - "Pressure Gauge (green band)"
    answers:
      "yes": q_door_close_led
      "no": q_pressure_switch_gate   # CHANGED (was q_pressure_switch_voltage)

  q_door_close_led:
    type: question
    title: "1.1 Quick Check — Door Close LED"
    field_prompt: "Is the green DOOR CLOSE LED illuminated?"
    workshop_prompt: "Is the green DOOR CLOSE LED illuminated on the Isolair Display Box?"
    show_in_field: true
    visual_refs:
      - "Isolair Display Box — Green LED"
    answers:
      "yes": q_context_in_field
      "no": q_pressure_switch_gate   # CHANGED (was q_pressure_switch_voltage)


  # ---------------- MODE GATE ----------------
  q_context_in_field:
    type: question
    title: "Context — Field or Workshop?"
    field_prompt: "Are you operating in the field with a spare snorkel pump + cable onboard?"
    workshop_prompt: "Is this troubleshooting being done in a workshop environment?"
    answers:
      "yes": q_field_swap_spare_pump
      "no": q_motor_power_ground

  
  # ----------------1.2 MOTOR CHECK FIELD PATH ----------------
  q_field_swap_spare_pump:
    type: question
    title: "Field Action — Swap Pump Assembly"
    field_prompt: "Plug in the spare pump assembly. Does the pump now operate?"
    workshop_prompt: "Swap the pump assembly using the Anderson plug. Does the spare pump run?"
    show_in_field: true
    answers:
      "yes": r_field_original_pump_fault
      "no": r_field_spare_pump_failed

  r_field_original_pump_fault:
    type: result
    title: "Field Result — Original Pump Fault"
    outcome: |
      Spare pump works — original pump or cable is faulty.
      Keep spare installed and tag the faulty unit for workshop repair.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  r_field_spare_pump_failed:
    type: result
    title: "Field Result — Not a Pump Fault"
    outcome: |
      Spare pump does not work — fault is upstream.
      Continue with Cyclic Controller or workshop electrical checks.
    next:
      - label: "Go to 1.5 Cyclic Controller"
        node: q_cc_replaced_and_retest
      - label: "Go to 1.3 Pressure Switch"
        node: q_pressure_switch_gate      # CHANGED (was q_pressure_switch_voltage)
      - label: "Go to 1.4 Relay"
        node: q_relay_field_gate          # CHANGED (was q_relay_output)
      - label: "Start Over"
        node: q_pressure_in_range


  # ---------------- 1.2 MOTOR CHECK WORKSHOP PATH ----------------
  q_motor_power_ground:
    type: question
    title: "1.2 Motor — Power & Ground"
    field_prompt: "Workshop test: power/ground at receptacle (use workshop procedure)."
    workshop_prompt: "Is there power and ground at the tank pump receptacle when the switch is pressed?"
    test_method: |
      Disconnect Anderson plug.
      While another person presses Pump Switch:
      - Check for power at tank receptacle
      - Confirm ground on other terminal
    visual_refs:
      - Pic 2
      - Pic 2.1
      - Pic 2.2
      - Pic 3
    answers:
      "yes": q_cable_continuity
      "no": q_pressure_switch_gate   # CHANGED (was q_pressure_switch_voltage)

  q_cable_continuity:
    type: question
    title: "1.2 Cable Continuity"
    workshop_prompt: "Is there continuity in both power and ground wires of the pump cable?"
    test_method: |
      Disconnect motor Milspec and Anderson plug.
      Check continuity end-to-end on both conductors.
    answers:
      "yes": r_ecc_likely_fault
      "no": r_power_cable_or_connector_fault

  r_ecc_likely_fault:
    type: result
    title: "Workshop Result — Likely End Cap Controller (ECC) Fault"
    outcome: |
      Power and cable continuity are OK. Motor assembly is likely faulty, most commonly the End Cap Controller (ECC).

      Action:
      - Continue using the spare pump (if available) and replace ECC ASAP.
      - ECC programming must be done by an authorised technician.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  r_power_cable_or_connector_fault:
    type: result
    title: "Workshop Result — Power Cable / Connector Fault"
    outcome: |
      No continuity found through the pump power cable.

      Action:
      - Inspect/repair cable and connectors.
      - Check Anderson plug contacts are correctly locked and not damaged.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

   # ---------------- 1.3 PRESSURE SWITCH ----------------
  # Field users should NOT diagnose pressure switch in-field.
  # We route Field -> a stop/result node, Workshop -> diagnostic question.

  q_pressure_switch_gate:
    type: question
    title: "1.3 Pressure Switch — Workshop Only"
    field_prompt: "Workshop-only check. Are you at base/maintenance with tools available?"
    workshop_prompt: "Proceed to Pressure Switch diagnostic check?"
    show_in_field: true
    answers:
      "yes": q_pressure_switch_voltage
      "no": r_field_return_to_base_pressure_switch

  r_field_return_to_base_pressure_switch:
    type: result
    title: "Field Result — Do Not Diagnose Pressure Switch In-Field"
    outcome: |
      Pressure Switch troubleshooting is workshop-only.

      Field action:
      - Do NOT attempt to diagnose the pressure switch in-field.
      - Contact workshop / return to base when safe.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  q_pressure_switch_voltage:
    type: question
    title: "1.3 Pressure Switch — High Pressure (N/O) Output"
    workshop_prompt: "With system ON and fault present: is there 24–28 VDC at the Pressure Switch High Pressure (N/O) terminal (Stauff Terminal 4)?"
    show_in_field: false
    test_method: |
      Preconditions / Notes:
      - System ON
      - Fault present
      - (Ideally) hydraulic pressure in normal range and DOOR CLOSE LED illuminated

      Method:
      - Measure voltage at the High Pressure (N/O) terminal on the pressure switch.
      - On Stauff pressure switches, this is Terminal 4.
    visual_refs:
      - Pic 4
      - Pic 5
      - Diagram 6.9
    answers:
      "yes": q_relay_output
      "no": r_replace_pressure_switch

  r_replace_pressure_switch:
    type: result
    title: "Workshop Result — Pressure Switch Fault / Not Closing"
    outcome: |
      No voltage at High Pressure (N/O) when expected.
      Likely pressure switch faulty or not closing correctly.

      Action:
      - Replace the pressure switch and re-test.
      - Seal against water ingress using DC4 silicone grease.
    next:
      - label: "Go to 1.4 Relay Check"
        node: q_relay_output
      - label: "Start Over"
        node: q_pressure_in_range




   # ---------------- 1.4 RELAY (WORKSHOP ONLY) ----------------

  # Gate for FIELD users: do not run relay diagnostics in-field
  q_relay_field_gate:
    type: question
    title: "1.4 Relay — Field Policy Gate"
    field_prompt: "Are you currently in the FIELD (fireground) environment?"
    workshop_prompt: "Proceed to relay testing?"
    show_in_field: true
    answers:
      "yes": r_field_do_not_diagnose_relay
      "no": q_relay_output


  r_field_do_not_diagnose_relay:
    type: result
    title: "Field Policy — Do NOT Diagnose Relay In-Field"
    outcome: |
      In-field policy:
        - Do NOT attempt relay electrical diagnosis in the field.
        - Contact base/workshop and return to base when practical.

      Reason (human factors / tooling):
        - Relay testing requires time, access, and correct tools to avoid false results.

      Optional field action:
        - If a spare Cyclic Controller is available, you may perform the fast-swap check.
    next:
      - label: "Go to 1.5 Cyclic Controller (fast swap)"
        node: q_cc_replaced_and_retest
      - label: "Start Over"
        node: q_pressure_in_range


  # ---------------- WORKSHOP PATH (full 1.4) ----------------

  # Step 1 — Relay Output (Workshop only)
  q_relay_output:
    type: question
    title: "1.4 Relay — Output Terminal Voltage"
    workshop_prompt: "Only when Pump Switch is triggered: is there 24–28 V at the RELAY large output terminal?"
    show_in_field: false
    test_method: |
      - Trigger the Pump Switch on the Cyclic Controller.
      - Listen for a relay click inside the tank control box.
      - Measure voltage at the large output terminal of the Snorkel Pump Power Relay.
    visual_refs:
      - Pic 7
    answers:
      "yes": q_power_at_anderson
      "no": q_relay_control_power


  # Step 1 follow-up — Power at Anderson plug (Workshop only)
  q_power_at_anderson:
    type: question
    title: "1.4 Relay — Power at Anderson Plug"
    workshop_prompt: "When Pump Switch is triggered: is power present at the Anderson plug AND contacts locked correctly?"
    show_in_field: false
    test_method: |
      - Trigger Pump Switch.
      - Check for power at the Snorkel Pump Anderson Plug.
      - Confirm both Anderson contacts are fully locked into the housing.
    visual_refs:
      - Pic 3
      - Pic 7
    answers:
      "yes": r_delivery_ok_upstream_check_pump_or_load
      "no": q_continuity_relay_to_anderson

  r_delivery_ok_upstream_check_pump_or_load:
    type: result
    title: "Workshop Result — Power Delivery OK at Anderson Plug"
    outcome: |
      Power is present at the Anderson plug with contacts locked.
      Upstream control path appears serviceable.

      Next:
      - Verify pump/load connection and condition.
      - Inspect wiring/connector integrity at the pump end.
    next:
      - label: "Start Over"
        node: q_pressure_in_range


  # Step 2 — Power Wire Continuity (Workshop only)
  q_continuity_relay_to_anderson:
    type: question
    title: "1.4 Relay — Continuity Relay → Anderson"
    workshop_prompt: "Is there continuity between relay LARGE output terminal and the Anderson plug power pin?"
    show_in_field: false
    test_method: |
      - Disconnect the Anderson plug.
      - Measure continuity between:
        - Relay large output terminal
        - Anderson plug power pin
    visual_refs:
      - Pic 2
      - Pic 7
    answers:
      "yes": r_ground_missing_at_anderson
      "no": r_faulty_wire_relay_to_anderson

  r_ground_missing_at_anderson:
    type: result
    title: "Workshop Result — Missing Ground at Anderson Plug"
    outcome: |
      Power feed continuity is OK.

      Action:
      - Ensure the other Anderson plug terminal has a suitable ground.
      - If ground is missing, investigate the ground path and connections.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  r_faulty_wire_relay_to_anderson:
    type: result
    title: "Workshop Result — Relay → Anderson Power Wire Fault"
    outcome: |
      No continuity between relay output and Anderson plug power pin.

      Action:
      - Inspect and repair wiring between the relay and the Anderson plug.
    next:
      - label: "Start Over"
        node: q_pressure_in_range


  # Step 4 — Control Power (Workshop only)
  q_relay_control_power:
    type: question
    title: "1.4 Relay — Control Power Present"
    workshop_prompt: "With system ON and pressure normal: is 24–28 V present at ONE small control terminal? (remove one control wire)"
    show_in_field: false
    test_method: |
      - Remove one control wire from the relay (avoid false readings through the coil).
      - Measure voltage at the remaining small control terminal.
    visual_refs:
      - Pic 7
      - Pic 8
    answers:
      "yes": q_relay_control_ground
      "no": r_control_power_feed_fault_or_return_to_pressure_switch

  r_control_power_feed_fault_or_return_to_pressure_switch:
    type: result
    title: "Workshop Result — Relay Control Power Feed Fault"
    outcome: |
      No control power at the relay control terminal with system ON and pressure normal.

      Action:
      - If pressure switch was confirmed serviceable, check wiring between the pressure switch and relay control terminal.
      - Otherwise return to the Pressure Switch check and confirm switch output.
    next:
      - label: "Go to 1.3 Pressure Switch"
        node: q_pressure_switch_voltage
      - label: "Start Over"
        node: q_pressure_in_range


  # Step 5 — Control Ground (Workshop only)
  q_relay_control_ground:
    type: question
    title: "1.4 Relay — Control Ground When Triggered"
    workshop_prompt: "Only when Pump Switch is triggered: is there ground at the OTHER small control terminal? (leave one wire disconnected)"
    show_in_field: false
    test_method: |
      - Leave one control wire disconnected.
      - Trigger the Pump Switch.
      - Measure for ground on the other small terminal.
    visual_refs:
      - Pic 7
      - Pic 8
    answers:
      "yes": r_relay_fault_replace_pn24214
      "no": q_cc_replaced_and_retest

  r_relay_fault_replace_pn24214:
    type: result
    title: "Workshop Result — Snorkel Pump Power Relay Fault"
    outcome: |
      Control power and control ground are present, but relay output does not switch.

      Action:
      - Replace relay and re-test.
      - Use specified relay part number: P/N 24214 (200 A).
    next:
      - label: "Start Over"
        node: q_pressure_in_range


    # ---------------- 1.5 CYCLIC CONTROLLER ----------------

  q_cc_pump_switch_quick:
    type: question
    title: "1.5 Pump Switch Function (Quick Check)"
    field_prompt: "Does the pump operate when the Pump Switch is triggered in either direction?"
    workshop_prompt: "Does the snorkel pump operate when the Pump Switch is triggered in either direction?"
    show_in_field: true
    visual_refs:
      - Pic 9
      - Diagram 6.1
    answers:
      "yes": r_partial_switch_function_service_note
      "no": q_cc_replaced_and_retest

  r_partial_switch_function_service_note:
    type: result
    title: "Result — Pump Switch Partially Functional"
    outcome: |
      The Pump Switch is partially functional (one direction may work even if the other is faulty).
      Action:
        - Continue to operate if required.
        - Replace the Cyclic Controller or repair the Pump Switch at the next maintenance opportunity.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  q_cc_replaced_and_retest:
    type: question
    title: "1.5 Replace Cyclic Controller"
    field_prompt: "Replace cyclic controller with spare. Does pump now work?"
    workshop_prompt: "Replace the Cyclic Controller with a serviceable unit and re-test. Does the pump now operate?"
    show_in_field: true
    answers:
      "yes": r_cc_faulty_keep_spare_installed
      "no": q_db9_test_available

  r_cc_faulty_keep_spare_installed:
    type: result
    title: "Field Result — Original Cyclic Controller Faulty"
    outcome: |
      After replacing the Cyclic Controller, the snorkel pump operates.
      Field action:
        - Keep the spare installed so the aircraft remains serviceable.
        - Tag the faulty unit for workshop repair (Pump Switch/internal repair) to restore a spare controller.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  # ---------------- 1.5 CYCLIC CONTROLLER MODE GATE ----------------

  q_db9_test_available:
    type: question
    title: "1.5 Workshop Test Availability — DB9 Continuity"
    field_prompt: "DB9 continuity test requires workshop tools. Can it be performed now?"
    workshop_prompt: "Can you perform the DB9 continuity test now?"
    show_in_field: true
    answers:
      "yes": q_db9_continuity_6_8
      "no": r_field_cannot_perform_db9

  r_field_cannot_perform_db9:
    type: result
    title: "Field Result — Workshop Test Not Available"
    outcome: |
      DB9 continuity testing cannot be performed now.
      Field action:
        - If a spare Cyclic Controller is installed, keep it installed to remain serviceable.
        - If the pump still will not operate, contact base/workshop for support.
      Next:
        - Perform DB9/ground return tests in the workshop when tools/time allow.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  # ---------------- 1.5 CYCLIC CONTROLLER WORKSHOP PATH ----------------

  q_db9_continuity_6_8:
    type: question
    title: "1.5 DB9 Continuity (Pins 6 & 8)"
    workshop_prompt: "Only when the Pump Switch is triggered: is there continuity between pins 6 and 8 on the DB9 connector?"
    test_method: |
      - Disconnect the DB9 connector from the rear of the Isolair Display Box (behind the DB25).
      - Trigger the Pump Switch and check continuity between pins 6 and 8.
    visual_refs:
      - Pic 9
      - Diagram 6.1
    answers:
      "yes": q_slot_m_ground
      "no": r_cc_internal_fault_workshop_repair

  r_cc_internal_fault_workshop_repair:
    type: result
    title: "Workshop Result — Cyclic Controller Internal Fault"
    outcome: |
      No continuity on DB9 pins 6–8 when the Pump Switch is triggered.
      Likely fault: Pump Switch or internal wiring within the Cyclic Controller.
      Workshop action:
        - Repair/replace the Pump Switch and restore controller serviceability.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  q_slot_m_ground:
    type: question
    title: "1.5 Data Plug Ground (Slot M)"
    workshop_prompt: "With system ON and main power connected: is there ground at slot M on the 24-pin data plug receptacle when the Pump Switch is triggered?"
    test_method: |
      - Ensure Isolair system is powered ON and main power plug remains connected.
      - Disconnect the 24-pin data plug from the aircraft.
      - Trigger the Pump Switch and check for ground at slot M on the receptacle.
    visual_refs:
      - Pic 10
      - Diagram 6.1
    answers:
      "yes": q_continuity_m_to_relay_ground
      "no": r_display_box_or_aircraft_wiring_fault

  q_continuity_m_to_relay_ground:
    type: question
    title: "1.5 Tank Wiring Continuity (M → Relay Control Ground)"
    workshop_prompt: "Is there continuity between pin M on the 24-pin data plug and the ground control terminal of the Snorkel Pump Power Relay?"
    test_method: |
      - With system safe, check continuity between pin M and the relay control ground terminal.
      - Note: slave relays are not fitted; test directly to the Snorkel Pump Power Relay.
    visual_refs:
      - Pic 7
      - Pic 8
      - Pic 11
      - Diagrams 6.3
      - Diagrams 6.4
      - Diagrams 6.5
    answers:
      "yes": r_recheck_relay_section
      "no": r_tank_wiring_or_pin_fault

  r_display_box_or_aircraft_wiring_fault:
    type: result
    title: "Likely Fault — Display Box / Aircraft Wiring to Data Plug"
    outcome: |
      No ground at slot M when the Pump Switch is triggered.
      Likely fault: Isolair Display Box or wiring to the 24-pin data plug.
      Action:
        - Check wiring diagrams and/or replace the Isolair Display Box (spares at base).
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  r_tank_wiring_or_pin_fault:
    type: result
    title: "Likely Fault — Tank Wiring / Damaged Pin"
    outcome: |
      No continuity between pin M and relay control ground.
      Likely fault: tank-side wiring or damaged pin in the 24-pin data plug.
      Action:
        - Inspect wiring/connectors and repair as required (Diagrams 6.3, 6.4, 6.5).
    next:
      - label: "Start Over"
        node: q_pressure_in_range

  r_recheck_relay_section:
    type: result
    title: "Tank Wiring OK — Re-check Relay Section"
    outcome: |
      Tank wiring is correct.
      Next:
        - Re-check Snorkel Pump Power Relay operation (Section 1.4) and verify correct relay identification.
    next:
      - label: "Start Over"
        node: q_pressure_in_range

   

