id: fc_4_uncommanded_door_opening
title: "First Check — Uncommanded Door Opening"
type: flow
version: 1
source_md: "docs/first_checks/FC-4_uncommanded_door_opening.md"

entry: fc_4_step_1_doors_remain_closed_after_empty

nodes:

  # -------------------------------------------------
  # Step 1 — Door Position Check
  # -------------------------------------------------
  fc_4_step_1_doors_remain_closed_after_empty:
    type: question
    field_prompt: "When the problem occurred, did the doors remain up in the closed position after the tank was emptied?"
    workshop_prompt: "When the problem occurred, did the doors remain up in the closed position after the tank was emptied?"
    answers:
      yes: fc_4_step_2_opening_speed_high_flow
      no: fc_4_step_3_pump_runs_and_doors_open_when_on

  # -------------------------------------------------
  # Step 2 — Door Opening Speed Check (High Flow?)
  # -------------------------------------------------
  fc_4_step_2_opening_speed_high_flow:
    type: question
    field_prompt: "Did the doors open quickly like a normal jettison release (high flow)?"
    workshop_prompt: "Did the doors open quickly like a normal jettison release (high flow)?"
    answers:
      yes: fc_4_step_2b_replace_controller
      no: fc_4_step_2a_cool_solenoid

  # -------------------------------------------------
  # Step 2A — Jettison Solenoid Overheating Path
  # -------------------------------------------------
  fc_4_step_2a_cool_solenoid:
    type: question
    field_prompt: "Allow the Jettison Solenoid to cool (system OFF). Does the system now operate correctly?"
    workshop_prompt: "Allow the Jettison Solenoid to cool (system OFF). Does the system now operate correctly?"
    answers:
      yes: fc_4_result_solenoid_overheating_identified
      no: tc_jettison_solenoid_check

    fc_4_result_solenoid_overheating_identified:
    type: result
    field_prompt: "Likely overheating Jettison Solenoid identified."
    workshop_prompt: "Likely overheating Jettison Solenoid identified."
    outcome: >
      Likely overheating Jettison Solenoid identified.
      Turn the system OFF during refuelling and between loads to prevent heat soak.
      To cool the solenoid faster, increase airflow and (if required) wrap a wet rag around the solenoid coil briefly.
      Re-test after cooling.
    next:
      - label: "If issue returns or persists: Jettison Solenoid Check"
        node: tc_jettison_solenoid_check


  # -------------------------------------------------
  # Step 2B — Jettison Switch Path (Controller swap)
  # -------------------------------------------------
  fc_4_step_2b_replace_controller:
    type: question
    field_prompt: "Replace the Cyclic Controller and re-test. Does the system now operate correctly?"
    workshop_prompt: "Replace the Cyclic Controller and re-test. Does the system now operate correctly?"
    answers:
      yes: terminal_replace_cyclic_controller
      no: tc_jettison_switch_check

  # -------------------------------------------------
  # Step 3 — Pump Running Check
  # -------------------------------------------------
  fc_4_step_3_pump_runs_and_doors_open_when_on:
    type: question
    field_prompt: "Does the hydraulic pump continue running and the door(s) remain open when the system is turned ON?"
    workshop_prompt: "Does the hydraulic pump continue running and the door(s) remain open when the system is turned ON?"
    answers:
      yes: fc_4_step_3a_replace_controller_door_switch_path
      no: terminal_mechanical_investigation_required

  # -------------------------------------------------
  # Step 3A — Door Switch Path (Controller swap)
  # -------------------------------------------------
  fc_4_step_3a_replace_controller_door_switch_path:
    type: question
    field_prompt: "Replace the Cyclic Controller and re-test. Does the system now operate correctly?"
    workshop_prompt: "Replace the Cyclic Controller and re-test. Does the system now operate correctly?"
    answers:
      yes: terminal_replace_cyclic_controller
      no: tc_hydraulic_cross_over_check

